services:
  backend:
    build:
      context: ./backend
    environment:
      LIGHTANNO_DATASET_ROOT: /data
      LIGHTANNO_WORKSPACE_ROOT: /workspace
      LIGHTANNO_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./data:/data
      - .:/workspace
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
